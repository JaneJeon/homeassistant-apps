# https://developers.home-assistant.io/docs/apps/configuration#app-configuration
name: Grafana (Fixed)
version: 13.1.0
slug: grafana
description: No-bullshit Grafana add-on
url: https://github.com/JaneJeon/homeassistant-apps/tree/main/grafana
arch:
  - aarch64
  - amd64
init: false
ports:
  8080/tcp: 8080 # main port
  8079/tcp: 8079 # profiler port
options:
  plugins: ""
  domain: localhost
  log_format: json
  log_level: info
  grafana_rendering_server_url: ""
  grafana_rendering_renderer_token: "-"
  enable_profiling: false
schema:
  plugins: "str?"
  domain: "str?"
  log_format: list(json|console)
  log_level: list(debug|info|warning|error)?
  grafana_rendering_server_url: "str?"
  grafana_rendering_renderer_token: "password?"
  enable_profiling: bool
image: "ghcr.io/janejeon/grafana"
